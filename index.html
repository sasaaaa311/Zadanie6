<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorium - Supabase & Urodziny</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col justify-between">

  <main class="max-w-4xl mx-auto p-6 w-full space-y-12">
    
    <header class="text-center my-6">
      <h1 class="text-4xl font-extrabold text-indigo-600 tracking-tight">Portal Artykułów & Narzędzia</h1>
      <p class="text-gray-500 mt-2">Projekt połączony z bazą danych Supabase</p>
    </header>

    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
        🎂 Licznik dni od urodzin
      </h2>
      <form id="form" class="flex flex-col sm:flex-row gap-4 items-end">
        <div class="flex-1">
          <label for="birthdate" class="block text-sm font-medium text-gray-700">Wybierz datę urodzenia</label>
          <input type="date" id="birthdate" required
            class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <button type="submit" 
          class="bg-gray-800 hover:bg-gray-900 text-white px-6 py-2 rounded-md font-medium shadow-sm transition duration-150">
          Oblicz dni
        </button>
      </form>

      <dialog id="dialog" class="p-6 rounded-xl shadow-2xl border border-gray-100 backdrop:bg-gray-900/50 open:flex flex-col gap-4 max-w-sm w-full mx-auto">
        <div class="text-center">
          <h3 class="text-lg font-bold text-gray-900 mb-2">Wynik analizy</h3>
          <p id="result" class="text-gray-700 text-base font-medium"></p>
        </div>
        <button id="close" class="mt-2 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-md font-medium transition duration-150">
          Zamknij
        </button>
      </dialog>
    </section>

    <hr class="border-gray-200">

    <section>
      <h2 class="text-2xl font-bold text-gray-900 mb-6 pb-2 border-b flex items-center gap-2">
        📰 Najnowsze artykuły
      </h2>
      <div id="articles" class="space-y-6">
        <p class="text-gray-400 italic">Ładowanie artykułów z bazy Supabase...</p>
      </div>
    </section>

    <section class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
      <h2 class="text-2xl font-bold text-gray-900 mb-4">Dodaj nowy artykuł</h2>
      
      <form id="form-articles" class="space-y-4">
        <div>
          <label for="title" class="block text-sm font-medium text-gray-700">Tytuł artykułu</label>
          <input type="text" id="title" required
            class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div>
          <label for="subtitle" class="block text-sm font-medium text-gray-700">Podtytuł</label>
          <input type="text" id="subtitle" required
            class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div>
          <label for="author" class="block text-sm font-medium text-gray-700">Autor</label>
          <input type="text" id="author" required
            class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div>
          <label for="content" class="block text-sm font-medium text-gray-700">Treść artykułu</label>
          <textarea id="content" rows="5" required
            class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"></textarea>
        </div>

        <button type="submit" 
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150">
          Opublikuj artykuł w Supabase
        </button>
      </form>
    </section>

  </main>

  <footer class="bg-gray-100 text-center py-4 border-t text-sm text-gray-500 mt-12">
    &copy; 2026 Projekt Webowy Supabase & GitHub Pages.
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
