<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprawdz ile dni zyjesz</title>
</head>

<body class="p-10">
  <h1 class="text-2xl font-bold mb-4">
    Sprawdz ile dni zyjesz
  </h1>

  <form id="form" class="flex gap-4 items-center">
    <input
      type="date"
      id="birthdate"
      class="border p-2"
    />

    <button
      type="submit"
      class="bg-blue-300 p-4"
    >
      Sprawdz
    </button>
  </form>

  <dialog
    id="dialog"
    class="bg-gray-200 p-4"
  >
    <button
      id="close"
      class="mb-2"
    >
      X
    </button>

    <p
      id="result"
      class="text-red-600"
    ></p>
  </dialog>

  <hr class="my-10">

  <h2 class="text-xl font-bold mb-4">Articles</h2>

  <div id="articles" class="mb-6"></div>

  <form id="form-articles" class="flex flex-col gap-2">
    <input id="title" class="border p-2" placeholder="title" />
    <input id="subtitle" class="border p-2" placeholder="subtitle" />
    <input id="author" class="border p-2" placeholder="author" />
    <textarea id="content" class="border p-2" placeholder="content"></textarea>

    <button type="submit" class="bg-green-400 p-2">
      Dodaj artykul
    </button>
  </form>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
